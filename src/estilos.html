<style>
  /* Tokens del sistema de diseño — ver docs/solution/design-system.md (ADR-0011) */
  :root {
    --c-primary-50:#FBF1EC; --c-primary-100:#F6E0D5; --c-primary-300:#DD9A7B;
    --c-primary-500:#B5562E; --c-primary-600:#9A4727; --c-primary-700:#8E4322; --c-primary-900:#4F2412;
    --c-accent-50:#F2F4EC; --c-accent-100:#E2E8D4; --c-accent-500:#5E7C46; --c-accent-600:#4D6739; --c-accent-700:#3D522E;
    --c-success:#4C8C4A; --c-success-bg:#E6F2E6;
    --c-warning:#D08A1E; --c-warning-bg:#FBEFD9;
    --c-error:#B23A2E;   --c-error-bg:#F7E2DF;
    --c-info:#4A6D7C;    --c-info-bg:#E5EDF0;
    --c-bg:#FBF8F4; --c-surface:#FFFFFF; --c-surface-alt:#F5F0E9;
    --c-border:#ECE5DC; --c-border-strong:#D9CFC2;
    --c-text:#2A2420; --c-text-muted:#6E655C; --c-text-disabled:#A89E92;
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
    --space-5:24px; --space-6:32px; --space-7:48px; --space-8:64px;
    --radius-sm:6px; --radius-md:10px; --radius-lg:16px; --radius-pill:999px;
    --shadow-sm:0 1px 2px rgba(42,36,32,.06);
    --shadow-md:0 4px 12px rgba(42,36,32,.10);
    --shadow-lg:0 12px 32px rgba(42,36,32,.18);
    --font-head:"Poppins", system-ui, sans-serif;
    --font-body:"Inter", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    color: var(--c-text);
    background: var(--c-bg);
  }
  h1, h2, h3 { font-family: var(--font-head); margin: 0; }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: var(--space-4);
    padding: var(--space-4) var(--space-5);
    background: var(--c-surface);
    border-bottom: 1px solid var(--c-border);
  }
  .app-header .marca { font-weight: 600; font-size: 1.5rem; color: var(--c-primary-700); }
  .app-header .usuario { font-size: 0.875rem; color: var(--c-text-muted); }

  .contenedor { max-width: 960px; margin: 0 auto; padding: var(--space-5); }

  .nav-secciones {
    display: flex; flex-wrap: wrap; gap: var(--space-3);
    margin-bottom: var(--space-6);
  }
  .btn {
    font-family: var(--font-body); font-weight: 600; font-size: 1rem;
    padding: 10px 16px; border-radius: var(--radius-md);
    border: 1px solid transparent; cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .btn:focus-visible { outline: 2px solid var(--c-accent-500); outline-offset: 2px; }
  .btn-primario { background: var(--c-primary-500); color: #fff; }
  .btn-primario:hover { background: var(--c-primary-600); }
  .btn-primario:active { background: var(--c-primary-700); }
  .btn-secundario { background: transparent; color: var(--c-primary-700); border-color: var(--c-primary-500); }
  .btn-secundario:hover { background: var(--c-primary-50); }
  .btn-nav.activo { background: var(--c-primary-500); color: #fff; }
  .btn-pequeno { padding: 6px 12px; font-size: 0.85rem; }

  .seccion { display: none; }
  .seccion.activa { display: block; }

  .panel {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
    padding: var(--space-5); margin-bottom: var(--space-5);
  }
  .panel h2 { font-size: 1.25rem; margin-bottom: var(--space-4); }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: .02em;
    color: var(--c-text-muted); font-weight: 600;
    background: var(--c-surface-alt); padding: var(--space-3);
    border-bottom: 1px solid var(--c-border);
  }
  thead th.orden { cursor: pointer; user-select: none; }
  thead th.orden:hover { color: var(--c-primary-700); }
  tbody td { padding: var(--space-3); border-bottom: 1px solid var(--c-border); }
  tbody tr:hover { background: var(--c-primary-50); }

  .vacio { color: var(--c-text-muted); padding: var(--space-4); text-align: center; }
  .enlace-acento { color: var(--c-accent-700); font-weight: 600; text-decoration: none; }

  /* Acceso denegado */
  .denegado { max-width: 480px; margin: 12vh auto; text-align: center; padding: var(--space-6); }
  .denegado .icono { font-size: 3rem; }
  .denegado h1 { font-size: 1.5rem; color: var(--c-primary-700); margin: var(--space-4) 0; }
  .denegado p { color: var(--c-text-muted); }

  /* Formulario */
  .form-grupo { margin-bottom: var(--space-4); }
  .form-grupo > label, .etiqueta-bloque {
    display: block; font-weight: 600; font-size: 0.9rem;
    margin-bottom: var(--space-2); color: var(--c-text);
  }
  .obligatorio { color: var(--c-error); }

  input[type="text"], input[type="tel"], input[type="email"], input[type="number"],
  input[type="date"], input[type="time"], select {
    width: 100%; font-family: var(--font-body); font-size: 1rem;
    padding: 11px var(--space-3); min-height: 44px;
    color: var(--c-text); background: var(--c-surface);
    border: 1px solid var(--c-border-strong); border-radius: var(--radius-md);
  }
  input:focus, select:focus {
    outline: 2px solid var(--c-accent-500); outline-offset: 1px;
    border-color: var(--c-accent-500);
  }
  textarea {
    width: 100%; font-family: var(--font-body); font-size: 1rem;
    padding: 11px var(--space-3); color: var(--c-text); background: var(--c-surface);
    border: 1px solid var(--c-border-strong); border-radius: var(--radius-md); resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--c-accent-500); outline-offset: 1px; border-color: var(--c-accent-500); }
  input[type="file"] { font-family: var(--font-body); font-size: 0.9rem; }
  input.invalido { border-color: var(--c-error); background: var(--c-error-bg); }

  /* Modal de confirmación */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(42,36,32,.45);
    display: flex; align-items: center; justify-content: center; z-index: 200; padding: var(--space-4);
  }
  .modal {
    background: var(--c-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    padding: var(--space-5); max-width: 420px; width: 100%;
  }
  .modal h3 { margin-bottom: var(--space-3); }
  .modal p { color: var(--c-text-muted); margin: 0 0 var(--space-5); }

  /* Estadísticas */
  .stats-zonas { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4); }
  .stat-card {
    background: var(--c-surface-alt); border: 1px solid var(--c-border);
    border-radius: var(--radius-md); padding: var(--space-4);
  }
  .stat-card h3 { font-size: 1rem; margin-bottom: var(--space-3); color: var(--c-primary-700); }
  .stat-card .stat-num { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-card .stat-label { font-size: 0.8rem; color: var(--c-text-muted); }

  /* Badge de estado de reserva */
  .estado-badge {
    display: inline-block; padding: 3px 12px; border-radius: var(--radius-pill);
    font-size: 0.8rem; font-weight: 700; color: #000;
  }
  .estado-abierta { background: #7FD0F0; }
  .estado-completada { background: #A6E08A; }
  .estado-cancelada { background: #C9C2B8; }

  /* Datos de la reserva (solo lectura) en la pantalla de edición */
  .datos-reserva {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: var(--space-3);
    background: var(--c-surface-alt); border: 1px solid var(--c-border);
    border-radius: var(--radius-md); padding: var(--space-4); margin-bottom: var(--space-4);
  }
  .datos-reserva > div { display: flex; flex-direction: column; gap: 2px; }
  .dato-etq { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .02em; color: var(--c-text-muted); font-weight: 600; }

  /* Fila desplegable con el panel de edición inline */
  .fila-detalle > td { padding: 0; background: var(--c-bg); }
  .fila-detalle .panel { margin: 0; border-radius: 0; box-shadow: none; border-left: none; border-right: none; }
  .fila-detalle:hover { background: transparent; }
  .acciones-fila { display: flex; gap: var(--space-2); flex-wrap: nowrap; }
  .tabla-scroll { overflow-x: auto; }
  .cobro-ingresado { background: #A6E08A; }
  .cobro-no { background: #F2A6A0; }
  /* En PC la tabla se adapta (sin barra); en móvil las columnas no parten y aparece scroll horizontal. */
  @media (max-width: 600px) { .tabla-ancha th, .tabla-ancha td { white-space: nowrap; } }
  #detalle-gestion:empty { display: none; }

  .ayuda-campo { font-size: 0.8rem; color: var(--c-text-muted); margin: var(--space-2) 0 0; }
  .error-campo { font-size: 0.8rem; color: var(--c-error); font-weight: 600; margin: var(--space-2) 0 0; }

  .campo-fila { display: flex; gap: var(--space-3); flex-wrap: wrap; }
  .campo-fila > .form-grupo { flex: 1 1 140px; }

  .lista-servicios { display: flex; flex-direction: column; gap: var(--space-2); }
  .servicio-item {
    display: flex; align-items: center; gap: var(--space-3);
    padding: var(--space-2) var(--space-3);
    border: 1px solid var(--c-border); border-radius: var(--radius-md);
    background: var(--c-surface-alt);
  }
  .servicio-item input[type="checkbox"] { width: 22px; height: 22px; min-height: 22px; flex: 0 0 auto; }
  .servicio-item .servicio-nombre { flex: 1 1 auto; margin: 0; font-weight: 500; }
  .servicio-item .servicio-cantidad { width: 84px; flex: 0 0 auto; }

  .resumen-importe {
    background: var(--c-surface-alt); border: 1px solid var(--c-border);
    border-radius: var(--radius-md); padding: var(--space-4); margin-bottom: var(--space-4);
  }
  .resumen-linea {
    display: flex; justify-content: space-between; gap: var(--space-3);
    padding: var(--space-1) 0; font-size: 0.95rem;
  }
  .resumen-linea span:last-child { font-variant-numeric: tabular-nums; }
  .resumen-subtotal {
    border-top: 1px solid var(--c-border-strong);
    margin-top: var(--space-2); padding-top: var(--space-2); font-weight: 600;
  }
  .resumen-total {
    border-top: 2px solid var(--c-primary-500);
    margin-top: var(--space-2); padding-top: var(--space-2);
    font-weight: 700; font-size: 1.05rem; color: var(--c-primary-700);
  }
  .resumen-importe .ayuda-campo { margin-top: var(--space-3); }

  .bloque-contacto {
    border: 1px solid var(--c-border); border-radius: var(--radius-md);
    padding: var(--space-4); margin-bottom: var(--space-4);
  }
  .bloque-contacto legend { font-weight: 600; font-size: 0.9rem; padding: 0 var(--space-2); }

  .form-acciones { display: flex; gap: var(--space-3); flex-wrap: wrap; margin-top: var(--space-5); }
  .form-acciones .btn { flex: 1 1 auto; }
  @media (min-width: 600px) {
    .form-acciones { justify-content: flex-end; }
    .form-acciones .btn { flex: 0 0 auto; }
  }

  /* Toast de feedback */
  .toast {
    position: fixed; left: 50%; bottom: var(--space-5); transform: translateX(-50%);
    max-width: 92%; padding: var(--space-3) var(--space-5);
    border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
    font-weight: 600; color: #fff; z-index: 100; text-align: center;
  }
  .toast-exito { background: var(--c-success); }
  .toast-error { background: var(--c-error); }
  .toast-info { background: var(--c-info); }
</style>
